name: CI

on:
  push:
    branches: [main, research-transformation]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run Ruff linting
        run: ruff check openuwoc_ai tests scripts

      - name: Run Black format check
        run: black --check openuwoc_ai tests scripts

      - name: Run MyPy static typing
        run: mypy openuwoc_ai

      - name: Run tests with coverage
        run: pytest --cov=openuwoc_ai --cov-report=term-missing
