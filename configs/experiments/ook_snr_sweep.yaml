experiment_name: ook_snr_sweep_simulation_only
status: implemented
random_seed: 42
water_type: coastal
distance_m: 10.0
num_bits: 10000
transmit_amplitude: 1.0
threshold: 0.5
snr_values_db:
  - 0
  - 5
  - 10
  - 15
  - 20
  - 25
outputs:
  table: results/tables/ook_snr_sweep.csv
  figure: results/figures/ook_ber_vs_snr.png
limitations:
  - Simulation-only baseline.
  - Uses AWGN and deterministic Beer-Lambert attenuation.
  - Does not model validated turbulence, multipath, or experimental hardware.
